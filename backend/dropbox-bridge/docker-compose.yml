services:
  bridge:
    image: jshsakura/oc-save-keeper-bridge:latest
    build:
      context: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DROPBOX_APP_KEY=${DROPBOX_APP_KEY}
      - POLL_TOKEN_SECRET=${POLL_TOKEN_SECRET}
      - DROPBOX_BRIDGE_BASE=${DROPBOX_BRIDGE_BASE:-https://example.yourdomain.com}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      - redis
    networks:
      - oc-save-keeper-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly no
      --save ""
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    networks:
      - oc-save-keeper-network

networks:
  oc-save-keeper-network:
    driver: bridge
