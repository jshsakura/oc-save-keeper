services:
  bridge:
    build:
      context: .
    image: oc-save-keeper/dropbox-bridge:latest
    env_file:
      - path: .env
        required: false
    ports:
      - "8080:8080"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    restart: unless-stopped
