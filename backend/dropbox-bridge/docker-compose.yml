services:
  bridge:
    image: jshsakura/oc-save-keeper-bridge:latest
    build:
      context: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DROPBOX_APP_KEY=${DROPBOX_APP_KEY}
      - POLL_TOKEN_SECRET=${POLL_TOKEN_SECRET}
      - DROPBOX_BRIDGE_BASE=${DROPBOX_BRIDGE_BASE}
      - BRIDGE_LOG_LEVEL=${BRIDGE_LOG_LEVEL:-WARNING}
      - ENABLE_ACCESS_LOGS=${ENABLE_ACCESS_LOGS:-0}
      - ENABLE_SECURITY_EVENT_LOGS=${ENABLE_SECURITY_EVENT_LOGS:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - VIOLATION_THRESHOLD=${VIOLATION_THRESHOLD:-5}
      - ALERT_COOLDOWN_SECONDS=${ALERT_COOLDOWN_SECONDS:-300}
      - BLACKLIST_FILE=${BLACKLIST_FILE:-/app/data/blacklist.txt}
    volumes:
      - ./data/blacklist.txt:/app/data/blacklist.txt
    depends_on:
      - redis
    networks:
      - oc-save-keeper-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly no
      --save ""
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    networks:
      - oc-save-keeper-network

networks:
  oc-save-keeper-network:
    driver: bridge
