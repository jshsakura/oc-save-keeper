name: Nightly Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    env:
      DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_BRIDGE_BASE: ${{ secrets.DROPBOX_BRIDGE_BASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          make clean
          make DROPBOX_APP_KEY="${DROPBOX_APP_KEY}" DROPBOX_BRIDGE_BASE="${DROPBOX_BRIDGE_BASE}"

      - name: Get date
        id: date
        run: |
          echo "tag=$(date -u +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          echo "name=$(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Upload nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ steps.date.outputs.tag }}
          name: Nightly ${{ steps.date.outputs.name }}
          body: Automated nightly build for testing. May contain unstable changes.
          prerelease: true
          make_latest: false
          generate_release_notes: false
          files: oc-save-keeper.nro
