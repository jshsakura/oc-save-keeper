name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - "main"
    paths:
      - 'source/**'
      - 'include/**'
      - 'romfs/**'
      - 'Makefile'
      - 'icon.png'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_BRIDGE_BASE: ${{ secrets.DROPBOX_BRIDGE_BASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build NRO in devkitPro container
        run: |
          test -n "$GITHUB_WORKSPACE"
          docker run --rm \
            -e DROPBOX_APP_KEY \
            -e DROPBOX_BRIDGE_BASE \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            devkitpro/devkita64 \
            bash -c 'make clean && make DROPBOX_APP_KEY="${DROPBOX_APP_KEY}" DROPBOX_BRIDGE_BASE="${DROPBOX_BRIDGE_BASE}"'

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oc-save-keeper-${{ github.sha }}
          path: oc-save-keeper.nro

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: oc-save-keeper.nro
