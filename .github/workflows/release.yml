name: Build Release

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"
    paths:
      - 'source/**'
      - 'include/**'
      - 'romfs/**'
      - 'Makefile'
      - 'icon.png'
      - 'GEMINI.md'
      - '.github/workflows/release.yml'
  pull_request:
    branches:
      - "main"
    paths:
      - 'source/**'
      - 'include/**'
      - 'romfs/**'
      - 'Makefile'
      - 'icon.png'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build NRO in devkitPro container
        run: |
          test -n "$GITHUB_WORKSPACE"
          docker run --rm \
            -e DROPBOX_APP_KEY="${DROPBOX_APP_KEY}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            devkitpro/devkita64 \
            make DROPBOX_APP_KEY="${DROPBOX_APP_KEY}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oc-save-keeper-${{ github.sha }}
          path: oc-save-keeper.nro

      - name: Upload prerelease assets (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Continuous Build (${{ github.sha }})
          prerelease: true
          make_latest: false
          generate_release_notes: false
          files: oc-save-keeper.nro

      - name: Upload release assets (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: oc-save-keeper.nro
